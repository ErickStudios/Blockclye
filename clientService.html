<!DOCTYPE html>
<html>
<head>
    <title>Blockclye Player</title>
    <link rel="stylesheet" href="style.css">
    <style>

        .title {
            font-size: 40px;
            margin-bottom: 10px;
        }

        body {
            background-image:
                linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.7)),
                url("client/screenshot.png");
            background-size: cover;
            background-repeat: no-repeat;
        }

        .subtitle {
            opacity: 0.7;
            margin-bottom: 30px;
        }

        input {
            padding: 12px;
            border-radius: 8px;
            border: none;
            outline: none;
            width: 220px;
            margin-bottom: 10px;
        }

        button {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            background: #30c49d;
            color: white;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            transform: scale(1.05);
            background: #28a884;
        }

        .bgCanvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: -1;
        }

        .main {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }
    </style>
</head>
<body style="top: 0px;left: 0px; margin: 0px; padding: 0px;">
    <!--[LOCAL] Interface-->
    <div id="ui">
        <!--[LOCAL] Image Of The Logo Of Blockclye-->
        <div style="display: flex;">
            <!--[LOCAL] Image Of The Blocks-->
            <img src="Icons/logo/BlockclyeIconNoText.svg" width="20px", height="20px" style="left: 50%; right: 50%;"></img>
            <!--[LOCAL] Text That Puts The Name Of The App-->
            <a href="index.html" style="color: azure; font-family: sans-serif;margin: 0; padding: 0;  text-decoration: none;">Blockclye</a>
        </div>
    </div>

    <!-- Main center UI -->
    <div class="main" id="min">
        <div class="title">Blockclye Player</div>
        <div class="subtitle">Join a world or start your own experience</div>

        <input id="serverId" placeholder="Enter Server ID">
        <br>
        <button id="connectBtn">Connect</button>
        <div style="display: flex; transform: translate(40%, 40%); text-align: center;" id="serverStatusContainer">
            <img id="serverStatusIcon" width="20">
            <p id="serverStatusText">Offline</p>
        </div>
    </div>

    <script type="module" src="./clientService.js"></script>

</body>
</html>
